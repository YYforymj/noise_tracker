    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Noise Monitor Online",
  "url": "https://noisetracker.online/",
  "applicationCategory": "UtilityApplication",
  "operatingSystem": "Web Browser",
  "description": "A free online noise monitor that tracks real-time environmental sound levels in dB.",

    <script>
      // FOUC prevention: set theme and locale before first paint
      ;(function() {
        var theme = localStorage.getItem('noise-tracker-theme')
        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'dark'
        }
        if (theme === 'dark') {
          document.documentElement.classList.add('dark')
        } else {
          document.documentElement.classList.remove('dark')
        }
        var locale = localStorage.getItem('noise-tracker-locale')
        if (locale) {
          document.documentElement.setAttribute('lang', locale === 'zh' ? 'zh-CN' : 'en')
        }
      })()
    </script>

  <body>
